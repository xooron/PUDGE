<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2: Pudge Wars Pro | Supabase Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Cinzel:wght@700&display=swap');
        
        body { background: #050705; color: #eee; font-family: 'Oswald', sans-serif; overflow: hidden; user-select: none; }

        /* Загрузка */
        #splash {
            position: fixed; inset: 0;
            background: url('https://i.ytimg.com/vi/hkGEwslJVPI/maxresdefault.jpg') no-repeat center center;
            background-size: cover; z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 100px;
        }
        .loader-bar { width: 60%; height: 6px; background: #111; border: 1px solid #333; position: relative; }
        #loader-progress { width: 0%; height: 100%; background: #a51d2d; box-shadow: 0 0 15px #f87171; transition: width 5s linear; }

        .screen { display: none; height: 100vh; width: 100vw; position: relative; }
        .active-screen { display: flex; flex-direction: column; }

        /* Header */
        .battle-header {
            background: linear-gradient(180deg, #1a1e1a 0%, #050705 100%);
            border-bottom: 2px solid #2d352d;
            height: 70px; display: flex; align-items: center; justify-content: center; gap: 60px;
        }
        .score-val { font-family: 'Cinzel', serif; font-size: 3rem; color: #fff; text-shadow: 0 0 15px #ff0000; }

        /* Game UI */
        #gameContainer { position: relative; width: 1200px; margin: 0 auto; }
        canvas { background: #0a0c0a; display: block; border: 2px solid #1a201a; cursor: crosshair; }

        .status-popup {
            position: absolute; pointer-events: none; animation: floatUp 1.2s ease-out forwards;
            font-size: 4rem; font-weight: 900; font-style: italic; z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-30px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }

        .hud-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 10px 25px; border: 2px solid #333; border-radius: 4px;
            display: flex; gap: 20px; align-items: center;
        }
        .ability-slot {
            width: 80px; height: 80px; border: 2px solid #555; position: relative;
            background-size: cover; cursor: pointer; border-radius: 4px;
        }
        .ability-slot.cd { filter: grayscale(1) brightness(0.3); }
        .ability-slot .cd-num {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold; background: rgba(0,0,0,0.6); color: white;
        }

        .pudge-btn { background: linear-gradient(to bottom, #7f1d1d, #450a0a); border: 1px solid #b91c1c; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="loader-bar"><div id="loader-progress"></div></div>
        <div class="mt-4 text-white uppercase tracking-[10px] font-bold text-xs">Connecting to DELS Base...</div>
    </div>

    <!-- AUTH SCREEN -->
    <div id="authScreen" class="screen items-center justify-center bg-[#050705]">
        <div class="bg-[#111] p-10 border border-[#333] rounded shadow-2xl w-96 text-center">
            <h1 class="text-3xl font-bold text-red-700 mb-8 italic italic uppercase tracking-tighter">Pudge Wars 1x1</h1>
            <input id="regNick" type="text" placeholder="ИМЯ МАСТЕРА" class="w-full bg-black border border-[#333] p-4 text-white mb-4 outline-none focus:border-red-600 font-bold">
            <input id="regDesc" type="text" placeholder="ОПИСАНИЕ" class="w-full bg-black border border-[#333] p-4 text-white mb-8 outline-none focus:border-red-600">
            <button onclick="saveAndEnter()" class="w-full pudge-btn py-4 font-bold uppercase italic hover:brightness-125 transition">В БОЙ</button>
        </div>
    </div>

    <!-- MAIN MENU -->
    <div id="menuScreen" class="screen">
        <header class="p-6 flex justify-between bg-[#0a0a0a] border-b border-zinc-800">
            <div onclick="toggleProfile()" class="flex items-center gap-4 cursor-pointer">
                <img src="https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png" class="w-16 h-16 rounded border-2 border-red-800">
                <div>
                    <div id="topNick" class="text-2xl font-bold">Pudge</div>
                    <div class="text-xs text-red-600 font-bold italic uppercase">Статистика</div>
                </div>
            </div>
            <div class="bg-black px-6 py-2 border border-yellow-900 text-yellow-500 font-bold" id="coinCount">1000 💰</div>
        </header>
        <main class="flex-grow flex items-center justify-center">
            <button onclick="initGame()" class="pudge-btn px-20 py-10 text-5xl font-black italic rounded-lg shadow-2xl hover:scale-105 transition">ИГРАТЬ 1х1</button>
        </main>
    </div>

    <!-- PROFILE -->
    <div id="profileModal" class="fixed inset-0 bg-black/95 z-[500] hidden items-center justify-center">
        <div class="bg-[#111] border border-red-900 p-10 w-full max-w-2xl relative">
            <button onclick="toggleProfile()" class="absolute top-4 right-6 text-4xl text-zinc-600 hover:text-white">&times;</button>
            <div class="flex gap-8 items-center mb-10">
                <img src="https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png" class="w-32 h-32 border-2 border-red-700">
                <div>
                    <h2 id="profNick" class="text-4xl font-bold uppercase">NICK</h2>
                    <p id="profDesc" class="text-zinc-500 italic">Meat Hook Warrior</p>
                    <p id="profID" class="text-blue-500 font-mono mt-2 text-xs">ID: 000000</p>
                </div>
                <div class="ml-auto text-center bg-black/50 p-4 border border-zinc-800">
                    <div id="rankIcon" class="text-5xl mb-1">🏅</div>
                    <div id="rankName" class="text-[10px] uppercase font-bold">Калибровка</div>
                    <div id="profMMR" class="text-red-600 font-bold">0 MMR</div>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-black p-6 border border-zinc-900 text-center">МАТЧЕЙ: <span id="statMatches" class="text-2xl block text-white">0</span></div>
                <div class="bg-black p-6 border border-zinc-900 text-center">ХУКОВ: <span id="statHooks" class="text-2xl block text-white">0</span></div>
            </div>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="battle-header">
            <div class="text-right w-80">
                <div id="hNickP" class="text-blue-400 font-bold text-2xl uppercase italic">PLAYER</div>
                <div class="text-[10px] text-zinc-500 tracking-widest">RADIANT</div>
            </div>
            <div class="score-val" id="hScore">0 - 0</div>
            <div class="text-left w-80">
                <div class="text-red-700 font-bold text-2xl uppercase italic">DIRE BOT</div>
                <div class="text-[10px] text-zinc-500 tracking-widest">DIRE</div>
            </div>
        </div>
        <div id="gameContainer">
            <canvas id="gameCanvas" width="1200" height="600"></canvas>
        </div>
        <div class="hud-panel">
            <div id="hookSlot" class="ability-slot" style="background-image: url('https://liquipedia.net/commons/images/9/91/Pudge_Meat_Hook_%28Grand_Abscession%29_abilityicon_dota2_gameasset.png');">
                <div id="cdFill" class="cd-num hidden">7</div>
                <div class="absolute -top-1 -left-1 bg-black text-[10px] border border-zinc-600 px-1 font-bold">Q</div>
            </div>
            <div class="text-sm text-zinc-400 font-bold leading-tight uppercase">
                ПКМ: Ходить<br>Q: Хук<br>7 Побед
            </div>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ SUPABASE
        const SUPABASE_URL = 'https://hrixnvenlcsskysijabq.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_UopsF6xZ16MKgPjmhxFSlA_gtYcX7sa';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = { 
            id: localStorage.getItem('pudge_id') || Math.floor(Math.random()*5000000+1000000).toString(),
            nick: "Pudge", 
            desc: "Fresh!", 
            coins: 1000, 
            matches: 0, 
            hooks: 0, 
            mmr: 0 
        };

        window.onload = async () => {
            localStorage.setItem('pudge_id', user.id);
            document.getElementById('loader-progress').style.width = '100%';

            // Пытаемся загрузить данные из базы при старте
            const { data, error } = await supabase.from('pudge_profiles').select('*').eq('id', user.id).single();
            if(data) {
                user = data;
                document.getElementById('regNick').value = user.nick;
                document.getElementById('regDesc').value = user.description || "";
            }

            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    showScreen('authScreen');
                }, 1000);
            }, 5000);
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        async function saveAndEnter() {
            const n = document.getElementById('regNick').value;
            if(!n) return alert("Никнейм!");
            user.nick = n;
            user.description = document.getElementById('regDesc').value || "Pudge Wars Legend";
            
            // Сохраняем/Обновляем в Supabase
            const { error } = await supabase.from('pudge_profiles').upsert({
                id: user.id,
                nick: user.nick,
                description: user.description,
                mmr: user.mmr,
                coins: user.coins,
                matches: user.matches,
                hooks: user.hooks
            });

            if(error) console.error("Error saving to Supabase:", error);

            updateUI();
            showScreen('menuScreen');
        }

        function toggleProfile() {
            const m = document.getElementById('profileModal');
            const h = m.classList.contains('hidden');
            m.classList.toggle('hidden', !h);
            m.classList.toggle('flex', h);
            if(h) updateUI();
        }

        function updateUI() {
            document.getElementById('topNick').innerText = user.nick;
            document.getElementById('profNick').innerText = user.nick;
            document.getElementById('hNickP').innerText = user.nick;
            document.getElementById('profDesc').innerText = user.description || user.desc;
            document.getElementById('profID').innerText = "ID: " + user.id;
            document.getElementById('statMatches').innerText = user.matches;
            document.getElementById('statHooks').innerText = user.hooks;
            document.getElementById('profMMR').innerText = user.matches < 10 ? (10-user.matches)+" до ранга" : user.mmr + " MMR";
            document.getElementById('coinCount').innerText = user.coins + " 💰";
        }

        // --- GAME ENGINE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pImg = new Image(); pImg.src = "https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png";

        let gameActive = false, pCD = false, bCD = false;
        let player, enemy, hook = { active: false, x:0, y:0, vx:0, vy:0, owner:null };
        let score = { p:0, e:0 };
        let mouseX = 0, mouseY = 0;

        function initGame() {
            showScreen('gameScreen');
            player = { x: 100, y: 300, tx: 100, ty: 300, alive: true, respawn: 0 };
            enemy = { x: 1100, y: 300, tx: 1100, ty: 300, alive: true, respawn: 0 };
            score = { p:0, e:0 };
            gameActive = true;
            updateScoreUI();
            requestAnimationFrame(gameLoop);
        }

        function updateScoreUI() {
            document.getElementById('hScore').innerText = `${score.p} - ${score.e}`;
        }

        function showPopup(text, color, isEnemy) {
            const div = document.createElement('div');
            div.className = 'status-popup';
            div.innerText = text;
            div.style.color = color;
            div.style.left = isEnemy ? (enemy.x - 80) + 'px' : (player.x - 80) + 'px';
            div.style.top = (isEnemy ? enemy.y : player.y) - 60 + 'px';
            document.getElementById('gameContainer').appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            if(player.alive) {
                player.tx = e.clientX - r.left;
                player.ty = e.clientY - r.top;
                if(player.tx > 550) player.tx = 550;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX - r.left;
            mouseY = e.clientY - r.top;
        });

        window.onkeydown = (e) => {
            if(e.code === 'KeyQ') {
                if(!pCD && !hook.active && player.alive) {
                    fireHook(player, mouseX, mouseY);
                }
            }
            if(e.code === 'Escape') { gameActive = false; showScreen('menuScreen'); }
        };

        function fireHook(owner, tx, ty) {
            if(hook.active) return;
            hook.active = true;
            hook.owner = owner;
            hook.x = owner.x; hook.y = owner.y;
            hook.sx = owner.x; hook.sy = owner.y;
            const ang = Math.atan2(ty - owner.y, tx - owner.x);
            hook.vx = Math.cos(ang) * 13;
            hook.vy = Math.sin(ang) * 13;
            
            if(owner === player) {
                user.hooks++;
                startCooldown('player');
            } else {
                startCooldown('bot');
            }
        }

        function startCooldown(who) {
            if(who === 'player') {
                pCD = true;
                const slot = document.getElementById('hookSlot');
                const fill = document.getElementById('cdFill');
                fill.classList.remove('hidden');
                let t = 7; fill.innerText = t;
                const i = setInterval(() => {
                    t--; fill.innerText = t;
                    if(t <= 0) { clearInterval(i); pCD = false; fill.classList.add('hidden'); }
                }, 1000);
            } else {
                bCD = true;
                setTimeout(() => bCD = false, 7000);
            }
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.fillStyle = "#121a12"; ctx.fillRect(0,0,1200,600);
            let grad = ctx.createLinearGradient(550, 0, 650, 0);
            grad.addColorStop(0, "#050505"); grad.addColorStop(0.5, "#0a1212"); grad.addColorStop(1, "#050505");
            ctx.fillStyle = grad; ctx.fillRect(560, 0, 80, 600);

            [player, enemy].forEach(u => {
                if(!u.alive) {
                    if(Date.now() > u.respawn) {
                        u.alive = true; u.x = (u === player) ? 100 : 1100; u.tx = u.x; u.ty = 300; u.y = 300;
                    }
                    return;
                }
                let dx = u.tx - u.x, dy = u.ty - u.y;
                let d = Math.sqrt(dx*dx + dy*dy);
                if(d > 5) {
                    u.x += (dx/d) * 4.4;
                    u.y += (dy/d) * 4.4;
                }
                u.x = Math.max(45, Math.min(u === player ? 540 : 1200, u.x));
                if(u === enemy && u.x < 660) u.x = 660;
                u.y = Math.max(45, Math.min(555, u.y));
            });

            if(enemy.alive) {
                if(Math.random() < 0.04) { enemy.tx = 700 + Math.random() * 450; enemy.ty = 50 + Math.random() * 500; }
                if(!bCD && !hook.active && Math.random() < 0.01) fireHook(enemy, player.x, player.y);
            }

            [player, enemy].forEach(p => {
                if(!p.alive) return;
                ctx.save();
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.beginPath(); ctx.ellipse(p.x, p.y + 35, 30, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.drawImage(pImg, p.x-45, p.y-45, 90, 90);
                ctx.restore();
            });

            if(hook.active) {
                renderDragonclaw();
                hook.x += hook.vx; hook.y += hook.vy;
                let target = (hook.owner === player) ? enemy : player;
                let dist = Math.sqrt((hook.x - target.x)**2 + (hook.y - target.y)**2);
                let range = Math.sqrt((hook.x - hook.sx)**2 + (hook.y - hook.sy)**2);
                if(dist < 45 && target.alive) { hit(target); hook.active = false; }
                if(range > 950 || hook.x < -50 || hook.x > 1250) hook.active = false;
            }

            if(score.p >= 7 || score.e >= 7) finish();
            else requestAnimationFrame(gameLoop);
        }

        function renderDragonclaw() {
            let dist = Math.sqrt((hook.x - hook.owner.x)**2 + (hook.y - hook.owner.y)**2);
            let segments = Math.floor(dist / 22);
            let ang = Math.atan2(hook.y - hook.owner.y, hook.x - hook.owner.x);
            for(let i=0; i<=segments; i++) {
                let sx = hook.owner.x + Math.cos(ang) * (i * 22);
                let sy = hook.owner.y + Math.sin(ang) * (i * 22);
                ctx.save();
                ctx.translate(sx, sy); ctx.rotate(ang);
                if(i === segments) {
                    ctx.fillStyle = "#f1f5f9"; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-35, -20); ctx.lineTo(-20, 0); ctx.lineTo(-35, 20); ctx.closePath(); ctx.fill();
                } else {
                    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(-11, -6, 22, 12);
                }
                ctx.restore();
            }
        }

        function hit(target) {
            target.alive = false; target.respawn = Date.now() + 3000;
            if(target === enemy) { score.p++; showPopup("ПОПАЛ!", "#4ade80", true); }
            else { score.e++; showPopup("ПРОИГРАЛ!", "#f87171", false); }
            updateScoreUI();
        }

        async function finish() {
            gameActive = false;
            user.matches++;
            if(score.p >= 7) { 
                user.mmr += 40; 
                user.coins += 200; 
                alert("ПОБЕДА!"); 
            } else { 
                user.mmr -= 60; 
                alert("ПОРАЖЕНИЕ..."); 
            }
            if(user.mmr < 0) user.mmr = 0;
            
            // Сохранение результатов в Supabase
            await supabase.from('pudge_profiles').upsert({
                id: user.id,
                nick: user.nick,
                mmr: user.mmr,
                coins: user.coins,
                matches: user.matches,
                hooks: user.hooks
            });

            updateUI();
            showScreen('menuScreen');
        }
    </script>
</body>
</html>
