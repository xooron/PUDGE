<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pudge Wars Elite | Dota Client Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            margin: 0;
        }

        /* Задний фон с размытием */
        .bg-video-wrap {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://cdnb.artstation.com/p/assets/covers/images/045/203/219/large/anton-chistiakov-anton-chistiakov-2022-01-14-14-01-15.jpg?1642158545') no-repeat center;
            background-size: cover;
            filter: blur(4px) brightness(0.6);
            transform: scale(1.1); /* Чтобы убрать белые края от блюра */
        }

        /* Стиль Осколков (Dota Plus) */
        .shards-container {
            display: flex; align-items: center; gap: 10px;
            padding: 5px 15px; border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .shard-icon {
            width: 24px; height: 32px;
            background: linear-gradient(135deg, #e37e2b, #8b4513);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            box-shadow: 0 0 10px rgba(227, 126, 43, 0.5);
        }
        .shard-value {
            font-family: 'Oswald', sans-serif;
            font-size: 22px; color: #f1d37e;
            text-shadow: 0 0 10px rgba(241, 211, 126, 0.4);
            line-height: 1;
        }
        .shard-label {
            font-size: 10px; color: #a3a3a3;
            text-transform: uppercase; font-weight: 800;
            letter-spacing: 1px; margin-top: -2px;
        }

        /* Кнопка ИГРАТЬ (Bottom Right) */
        .play-anchor {
            position: fixed; bottom: 40px; right: 40px;
            z-index: 100;
        }
        .btn-dota-play {
            background: linear-gradient(to right, #40b044, #2d8131);
            padding: 15px 80px; border-radius: 4px;
            font-family: 'Oswald', sans-serif; font-size: 32px; font-weight: 700;
            text-transform: uppercase; font-style: italic;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 20px rgba(64, 176, 68, 0.3);
            transition: 0.2s; cursor: pointer;
        }
        .btn-dota-play:hover {
            filter: brightness(1.2); transform: scale(1.05);
            box-shadow: 0 0 30px rgba(64, 176, 68, 0.5);
        }

        /* Общие стили интерфейса */
        .glass-panel {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .screen { display: none; height: 100vh; width: 100vw; }
        .active-screen { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #splash {
            position: fixed; inset: 0; z-index: 9999;
            background: #000 url('https://i.ytimg.com/vi/hkGEwslJVPI/maxresdefault.jpg') no-repeat center;
            background-size: cover; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 80px;
        }
    </style>
</head>
<body>

    <div class="bg-video-wrap"></div>

    <!-- ЗАГРУЗКА -->
    <div id="splash">
        <div class="w-64 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="loader-progress" class="w-0 h-full bg-red-600 shadow-[0_0_15px_red] transition-all duration-[5000ms] ease-linear"></div>
        </div>
        <div class="mt-4 text-[10px] uppercase tracking-[5px] opacity-50">DOTA 2 PUDGE WARS</div>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="authScreen" class="screen">
        <div class="flex items-center justify-center h-full">
            <div class="glass-panel p-10 rounded-2xl w-96 text-center border-t-2 border-red-600">
                <h1 class="text-3xl font-black mb-8 italic tracking-tighter">PUDGE 1x1</h1>
                <div id="authForms">
                    <input id="logUser" type="text" placeholder="ЛОГИН" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-red-600 transition">
                    <input id="logPass" type="password" placeholder="ПАРОЛЬ" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-red-600 transition">
                    <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl font-bold uppercase hover:brightness-110">Войти</button>
                    <p class="text-xs mt-4 opacity-40">Нет аккаунта? <span onclick="alert('Регистрация временно через логин')" class="underline cursor-pointer">Создать</span></p>
                </div>
            </div>
        </div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menuScreen" class="screen">
        <!-- Левая панель: Профиль и Друзья -->
        <div class="absolute top-10 left-10 space-y-6">
            <!-- Блок профиля -->
            <div onclick="toggleModal('profileModal')" class="glass-panel p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-white/5 transition">
                <div class="relative">
                    <img src="https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png" class="w-16 h-16 rounded-xl border-2 border-red-600">
                    <div id="rankIconMain" class="absolute -bottom-2 -right-2 bg-black border border-white/20 w-8 h-8 rounded-lg flex items-center justify-center text-sm">🔒</div>
                </div>
                <div>
                    <div id="userNickMain" class="text-2xl font-black tracking-tight">Pudge</div>
                    <div class="text-[10px] text-green-500 uppercase font-black tracking-widest">В СЕТИ</div>
                </div>
            </div>

            <!-- Список друзей -->
            <div class="glass-panel w-64 p-5 rounded-3xl h-[400px] flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                    <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Друзья</span>
                    <button onclick="addFriendPrompt()" class="text-green-500 text-xl hover:scale-110 transition">+</button>
                </div>
                <div id="friendsContainer" class="flex-grow overflow-y-auto space-y-2">
                    <!-- Список -->
                </div>
            </div>
        </div>

        <!-- Верхняя правая панель: Осколки и Выход -->
        <div class="absolute top-10 right-10 flex items-center gap-6">
            <!-- Осколки -->
            <div class="shards-container cursor-pointer hover:brightness-110 transition" onclick="alert('Магазин в разработке')">
                <div class="shard-icon"></div>
                <div>
                    <div class="shard-value" id="coinsMain">18,068</div>
                    <div class="shard-label">Осколков</div>
                </div>
            </div>
            
            <!-- Выход -->
            <button onclick="location.reload()" class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center hover:rotate-90 transition shadow-lg">✕</button>
        </div>

        <!-- Кнопка ИГРАТЬ -->
        <div class="play-anchor">
            <button onclick="toggleModal('playModal')" class="btn-dota-play">ИГРАТЬ</button>
        </div>
    </div>

    <!-- МОДАЛКИ (Выбор режима) -->
    <div id="playModal" class="fixed inset-0 bg-black/90 z-[1000] hidden items-center justify-center">
        <div class="glass-panel p-10 rounded-[40px] flex flex-col gap-4 w-80">
            <h2 class="text-center font-black text-xl mb-4 tracking-widest uppercase">Режим игры</h2>
            <button onclick="startGame('bot')" class="bg-white/5 border border-white/10 py-5 rounded-2xl font-bold hover:bg-white/10 transition flex justify-between px-6">
                С БОТОМ <span>🤖</span>
            </button>
            <button onclick="alert('Выберите друга')" class="bg-indigo-600 py-5 rounded-2xl font-bold hover:brightness-110 transition flex justify-between px-6">
                ДУЭЛЬ 1х1 <span>⚔️</span>
            </button>
            <button onclick="toggleModal('playModal')" class="mt-4 opacity-50 text-sm">Назад</button>
        </div>
    </div>

    <script>
        // ИНИЦИАЛИЗАЦИЯ SUPABASE
        const SUPABASE_URL = 'https://kqlbnybifjoamckgkltv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_ZTatmjCcOgN5o_EY1-SBUg_7t0bVIem'; // ЗАМЕНИ НА ANON KEY
        const pudgeDb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = { id: "", nick: "", mmr: 0, coins: 0, matches: 0 };

        window.onload = () => {
            document.getElementById('loader-progress').style.width = '100%';
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('authScreen').classList.add('active-screen');
                }, 1000);
            }, 5000);
        };

        async function handleLogin() {
            const nick = document.getElementById('logUser').value;
            const pass = document.getElementById('logPass').value;
            if(!nick || !pass) return alert("Введите данные");

            const { data } = await pudgeDb.from('pudge_profiles').select('*').eq('nick', nick).eq('password', pass).maybeSingle();
            
            if(data) {
                user = data;
                enterMenu();
            } else {
                // Если не нашли - регистрируем (упрощенно)
                const id = Math.floor(100000 + Math.random()*899999).toString();
                const { error } = await pudgeDb.from('pudge_profiles').insert([{ id, nick, password: pass, mmr:0, coins:18068, matches:0 }]);
                if(!error) { alert("Аккаунт создан!"); handleLogin(); }
                else alert("Ошибка входа");
            }
        }

        function enterMenu() {
            document.getElementById('authScreen').classList.remove('active-screen');
            document.getElementById('menuScreen').classList.add('active-screen');
            updateUI();
        }

        function updateUI() {
            document.getElementById('userNickMain').innerText = user.nick;
            document.getElementById('coinsMain').innerText = user.coins.toLocaleString();
            
            if(user.matches >= 10) {
                document.getElementById('rankIconMain').innerText = "🏆";
            }
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        }

        function startGame(mode) {
            alert("Запуск игрового движка Pudge Wars...");
            // Здесь будет твой код с Canvas
        }

        async function addFriendPrompt() {
            const id = prompt("Введите ID игрока:");
            if(id) alert("Запрос отправлен!");
        }
    </script>
</body>
</html>
