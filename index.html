<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pudge Wars Elite | Dota Client Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; user-select: none; }

        /* Задний фон с размытием */
        .bg-video-wrap {
            position: fixed; inset: 0; z-index: -1;
            background: url('https://cdnb.artstation.com/p/assets/covers/images/045/203/219/large/anton-chistiakov-anton-chistiakov-2022-01-14-14-01-15.jpg?1642158545') no-repeat center;
            background-size: cover; filter: blur(6px) brightness(0.5); transform: scale(1.1);
        }

        /* Стиль Осколков (Dota Plus) */
        .shards-container {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 20px; border-radius: 4px;
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .shard-icon {
            width: 20px; height: 28px;
            background: linear-gradient(180deg, #ed9e4d 0%, #7c3a0d 100%);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }
        .shard-value { font-family: 'Oswald', sans-serif; font-size: 24px; color: #f1d37e; line-height: 1; }
        .shard-label { font-size: 11px; color: #a3a3a3; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* Кнопка ИГРАТЬ (Bottom Right) */
        .play-anchor { position: fixed; bottom: 50px; right: 50px; z-index: 100; }
        .btn-dota-play {
            background: linear-gradient(to right, #40b044, #2d8131);
            padding: 18px 100px; border-radius: 4px;
            font-family: 'Oswald', sans-serif; font-size: 38px; font-weight: 700;
            text-transform: uppercase; font-style: italic;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 30px rgba(64, 176, 68, 0.4); transition: 0.2s; cursor: pointer;
        }
        .btn-dota-play:hover { filter: brightness(1.2); transform: scale(1.05); }

        .glass-panel { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .screen { display: none; height: 100vh; width: 100vw; position: relative; }
        .active-screen { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Игровые всплывашки */
        .status-popup {
            position: absolute; pointer-events: none; animation: floatUp 1.2s ease-out forwards;
            font-size: 4rem; font-weight: 900; font-style: italic; z-index: 1000;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-30px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }

        #splash {
            position: fixed; inset: 0; z-index: 9999; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        canvas { background: #0a0c0a; display: block; border: 2px solid #1a201a; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="bg-video-wrap"></div>

    <!-- ЗАГРУЗКА -->
    <div id="splash">
        <img src="https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png" class="w-32 mb-8 animate-pulse">
        <div class="w-64 h-1 bg-white/10 rounded-full overflow-hidden">
            <div id="loader-progress" class="w-0 h-full bg-red-600 shadow-[0_0_15px_red] transition-all duration-[3000ms] ease-linear"></div>
        </div>
        <div class="mt-4 text-[10px] uppercase tracking-[5px] opacity-50">DOTA 2 PUDGE WARS</div>
    </div>

    <!-- АВТОРИЗАЦИЯ -->
    <div id="authScreen" class="screen">
        <div class="flex items-center justify-center h-full">
            <div class="glass-panel p-10 rounded-3xl w-[400px] text-center shadow-2xl border-t-4 border-red-600">
                <h1 class="text-4xl font-black mb-10 italic tracking-tighter">PUDGE 1x1</h1>
                <div class="space-y-4">
                    <input id="logUser" type="text" placeholder="ЛОГИН" class="w-full bg-black/60 border border-white/10 p-4 rounded-xl outline-none focus:border-red-600 transition">
                    <input id="logPass" type="password" placeholder="ПАРОЛЬ" class="w-full bg-black/60 border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-red-600 transition">
                    <button onclick="handleLogin()" class="w-full bg-red-600 py-4 rounded-xl font-bold uppercase hover:brightness-110 shadow-lg">ВОЙТИ / СОЗДАТЬ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="menuScreen" class="screen">
        <!-- ЛЕВАЯ ПАНЕЛЬ -->
        <div class="absolute top-10 left-10 space-y-6">
            <div onclick="toggleModal('profileModal')" class="glass-panel p-4 rounded-2xl flex items-center gap-4 cursor-pointer hover:bg-white/5 transition">
                <div class="relative">
                    <img src="https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png" class="w-16 h-16 rounded-xl border-2 border-red-600">
                    <div id="rankIconMain" class="absolute -bottom-2 -right-2 bg-black border border-white/20 w-8 h-8 rounded-lg flex items-center justify-center text-sm">🔒</div>
                </div>
                <div>
                    <div id="userNickMain" class="text-2xl font-black tracking-tight">Pudge</div>
                    <div class="text-[10px] text-green-500 font-black tracking-widest uppercase">В сети</div>
                </div>
            </div>

            <div class="glass-panel w-64 p-5 rounded-3xl h-[400px] flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b border-white/5 pb-2">
                    <span class="text-[10px] font-black opacity-40 uppercase tracking-widest">Друзья</span>
                    <button onclick="addFriendPrompt()" class="text-green-500 text-xl hover:scale-110 transition">+</button>
                </div>
                <div id="friendsContainer" class="flex-grow overflow-y-auto space-y-2"></div>
            </div>
        </div>

        <!-- ПРАВАЯ ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="absolute top-10 right-10 flex items-center gap-6">
            <div class="shards-container cursor-pointer hover:brightness-110 transition" onclick="toggleModal('shopModal')">
                <div class="shard-icon"></div>
                <div>
                    <div class="shard-value" id="coinsMain">18,068</div>
                    <div class="shard-label">Осколков</div>
                </div>
            </div>
            <button onclick="location.reload()" class="w-10 h-10 rounded-full bg-red-600 flex items-center justify-center hover:rotate-90 transition">✕</button>
        </div>

        <!-- КНОПКА ИГРАТЬ -->
        <div class="play-anchor">
            <button onclick="toggleModal('playModal')" class="btn-dota-play">ИГРАТЬ</button>
        </div>
    </div>

    <!-- ИГРОВОЙ ЭКРАН -->
    <div id="gameScreen" class="screen bg-black">
        <div class="flex justify-between items-center p-6 bg-zinc-900/50 border-b border-red-600">
            <div class="text-blue-400 font-bold text-2xl uppercase" id="gNickP">PLAYER</div>
            <div class="text-5xl font-black italic" id="gScore">0 - 0</div>
            <div class="text-red-600 font-bold text-2xl uppercase">DIRE BOT</div>
        </div>
        <div id="gameContainer" class="flex items-center justify-center h-[calc(100vh-100px)]">
            <canvas id="gameCanvas" width="1200" height="600"></canvas>
        </div>
        <!-- Худ кнопки -->
        <div class="fixed bottom-10 left-1/2 -translate-x-1/2 glass-panel p-4 flex gap-6 items-center">
            <div id="hookBtn" class="w-20 h-20 border-2 border-zinc-600 rounded-xl relative" style="background-image: url('https://liquipedia.net/commons/images/9/91/Pudge_Meat_Hook_%28Grand_Abscession%29_abilityicon_dota2_gameasset.png'); background-size: cover;">
                <div id="cdFill" class="absolute inset-0 bg-black/70 hidden items-center justify-center text-3xl font-bold">7</div>
                <div class="absolute -top-2 -left-2 bg-black px-2 border border-zinc-600 text-xs">Q</div>
            </div>
            <div class="text-xs opacity-50 font-bold uppercase">ПКМ: Ходить<br>Q: Хук по курсору</div>
            <button onclick="exitGame()" class="text-red-500 font-bold uppercase text-xs underline">Покинуть</button>
        </div>
    </div>

    <!-- МОДАЛКИ -->
    <div id="playModal" class="fixed inset-0 bg-black/90 z-[1000] hidden items-center justify-center">
        <div class="glass-panel p-10 rounded-[40px] flex flex-col gap-4 w-80">
            <h2 class="text-center font-black text-xl mb-4 tracking-widest uppercase">Режим игры</h2>
            <button onclick="initMatch('bot')" class="bg-white/5 border border-white/10 py-5 rounded-2xl font-bold hover:bg-white/10 transition flex justify-between px-6">
                ПРОТИВ БОТА <span>🤖</span>
            </button>
            <button onclick="alert('Выберите друга')" class="bg-indigo-600 py-5 rounded-2xl font-bold hover:brightness-110 transition flex justify-between px-6">
                ДУЭЛЬ 1х1 <span>⚔️</span>
            </button>
            <button onclick="toggleModal('playModal')" class="mt-4 opacity-50 text-sm">Назад</button>
        </div>
    </div>

    <div id="profileModal" class="fixed inset-0 bg-black/95 z-[1000] hidden items-center justify-center">
        <div class="glass-panel p-10 rounded-[40px] w-[500px] relative text-center">
            <button onclick="toggleModal('profileModal')" class="absolute top-6 right-6 text-2xl opacity-30">✕</button>
            <img src="https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png" class="w-24 h-24 rounded-3xl border-2 border-red-600 mx-auto mb-4 shadow-2xl">
            <h2 id="profNick" class="text-3xl font-black">Nick</h2>
            <p id="profId" class="text-indigo-500 font-mono text-xs mb-8">ID: 000000</p>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                    <div class="text-[10px] uppercase opacity-40 font-bold mb-1">MMR Rating</div>
                    <div id="profMMR" class="text-3xl font-black text-indigo-400">0</div>
                </div>
                <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                    <div class="text-[10px] uppercase opacity-40 font-bold mb-1">Матчей</div>
                    <div id="profMatches" class="text-3xl font-black text-white">0</div>
                </div>
            </div>
        </div>
    </div>

    <div id="shopModal" class="fixed inset-0 bg-black/95 z-[1000] hidden items-center justify-center">
        <div class="glass-panel p-10 rounded-[40px] w-96 text-center">
            <h2 class="text-2xl font-black text-yellow-500 mb-6">МАГАЗИН</h2>
            <p class="opacity-30 italic">Предметов пока нет</p>
            <button onclick="toggleModal('shopModal')" class="mt-8 bg-white/10 px-6 py-2 rounded-lg">Закрыть</button>
        </div>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ SUPABASE ---
        const SUPABASE_URL = 'https://kqlbnybifjoamckgkltv.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_ZTatmjCcOgN5o_EY1-SBUg_7t0bVIem'; // ЗАМЕНИ НА СВОЙ ANON KEY
        const pudgeDb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let user = { id: "", nick: "", mmr: 0, coins: 18068, matches: 0, hooks: 0 };

        window.onload = () => {
            document.getElementById('loader-progress').style.width = '100%';
            setTimeout(() => {
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    showScreen('authScreen');
                }, 1000);
            }, 3000);
        };

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(id).classList.add('active-screen');
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
            if(id === 'profileModal') updateProfileUI();
        }

        async function handleLogin() {
            const nick = document.getElementById('logUser').value.trim();
            const pass = document.getElementById('logPass').value.trim();
            if(!nick || !pass) return alert("Введите данные");

            const { data, error } = await pudgeDb.from('pudge_profiles').select('*').eq('nick', nick).eq('password', pass).maybeSingle();
            
            if(data) {
                user = data;
                enterMenu();
            } else {
                const id = Math.floor(100000 + Math.random()*899999).toString();
                const { error: regErr } = await pudgeDb.from('pudge_profiles').insert([{ id, nick, password: pass, mmr:0, coins:18068, matches:0, hooks:0 }]);
                if(!regErr) { alert("Аккаунт создан!"); handleLogin(); }
                else alert("Ошибка: Возможно ник занят.");
            }
        }

        function enterMenu() {
            showScreen('menuScreen');
            document.getElementById('userNickMain').innerText = user.nick;
            document.getElementById('coinsMain').innerText = user.coins.toLocaleString();
            document.getElementById('rankIconMain').innerText = user.matches < 10 ? "🔒" : "🏆";
        }

        function updateProfileUI() {
            document.getElementById('profNick').innerText = user.nick;
            document.getElementById('profId').innerText = "ID: " + user.id;
            document.getElementById('profMMR').innerText = user.mmr;
            document.getElementById('profMatches').innerText = user.matches;
        }

        // --- ИГРОВОЙ ДВИЖОК ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pImg = new Image(); pImg.src = "https://images.genius.com/e05ad2b3029a4feea47ac108100b6eb3.1000x1000x1.png";

        let gameActive = false, pCD = false, bCD = false;
        let player, enemy, hook = { active: false, x:0, y:0, vx:0, vy:0, owner:null };
        let score = { p:0, e:0 };
        let mouseX = 0, mouseY = 0;

        function initMatch(mode) {
            toggleModal('playModal');
            showScreen('gameScreen');
            document.getElementById('gNickP').innerText = user.nick;
            player = { x: 100, y: 300, tx: 100, ty: 300, alive: true, respawn: 0 };
            enemy = { x: 1100, y: 300, tx: 1100, ty: 300, alive: true, respawn: 0 };
            score = { p:0, e:0 };
            gameActive = true;
            updateScoreUI();
            requestAnimationFrame(gameLoop);
        }

        function updateScoreUI() {
            document.getElementById('gScore').innerText = `${score.p} - ${score.e}`;
        }

        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            const r = canvas.getBoundingClientRect();
            if(player.alive) {
                player.tx = e.clientX - r.left; player.ty = e.clientY - r.top;
                if(player.tx > 550) player.tx = 550;
            }
        });

        canvas.addEventListener('mousemove', e => {
            const r = canvas.getBoundingClientRect();
            mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
        });

        window.onkeydown = e => {
            if(e.code === 'KeyQ' && gameActive && !pCD && !hook.active && player.alive) fireHook(player, mouseX, mouseY);
        };

        function fireHook(owner, tx, ty) {
            hook.active = true; hook.owner = owner;
            hook.x = owner.x; hook.y = owner.y;
            hook.sx = owner.x; hook.sy = owner.y;
            const ang = Math.atan2(ty - owner.y, tx - owner.x);
            hook.vx = Math.cos(ang) * 14; hook.vy = Math.sin(ang) * 14;
            
            if(owner === player) {
                user.hooks++;
                pCD = true;
                const fill = document.getElementById('cdFill');
                fill.classList.remove('hidden'); fill.classList.add('flex');
                let t = 7; fill.innerText = t;
                const i = setInterval(() => {
                    t--; fill.innerText = t;
                    if(t <= 0) { clearInterval(i); pCD = false; fill.classList.add('hidden'); }
                }, 1000);
            } else { bCD = true; setTimeout(() => bCD = false, 7000); }
        }

        function gameLoop() {
            if(!gameActive) return;
            ctx.fillStyle = "#121a12"; ctx.fillRect(0,0,1200,600);
            ctx.fillStyle = "#050505"; ctx.fillRect(560, 0, 80, 600); // River

            [player, enemy].forEach(u => {
                if(!u.alive) {
                    if(Date.now() > u.respawn) { u.alive = true; u.x = (u === player) ? 100 : 1100; u.tx = u.x; u.y = 300; u.ty = 300; }
                    return;
                }
                let dx = u.tx - u.x, dy = u.ty - u.y;
                let d = Math.sqrt(dx*dx + dy*dy);
                if(d > 5) { u.x += (dx/d) * 4.5; u.y += (dy/d) * 4.5; }
                u.x = Math.max(45, Math.min(u === player ? 540 : 1200, u.x));
                if(u === enemy && u.x < 660) u.x = 660;
                u.y = Math.max(45, Math.min(555, u.y));
            });

            if(enemy.alive) {
                if(Math.random() < 0.04) { enemy.tx = 700 + Math.random()*450; enemy.ty = Math.random()*550; }
                if(!bCD && !hook.active && Math.random() < 0.01) fireHook(enemy, player.x, player.y);
            }

            [player, enemy].forEach(p => {
                if(!p.alive) return;
                ctx.save();
                ctx.fillStyle = "rgba(0,0,0,0.4)";
                ctx.beginPath(); ctx.ellipse(p.x, p.y + 35, 30, 10, 0, 0, Math.PI*2); ctx.fill();
                ctx.drawImage(pImg, p.x-45, p.y-45, 90, 90);
                ctx.restore();
            });

            if(hook.active) {
                renderDragonclaw();
                hook.x += hook.vx; hook.y += hook.vy;
                let target = (hook.owner === player) ? enemy : player;
                let dist = Math.sqrt((hook.x - target.x)**2 + (hook.y - target.y)**2);
                let range = Math.sqrt((hook.x - hook.sx)**2 + (hook.y - hook.sy)**2);
                if(dist < 45 && target.alive) { hit(target); hook.active = false; }
                if(range > 950 || hook.x < -50 || hook.x > 1250) hook.active = false;
            }

            if(score.p >= 7 || score.e >= 7) finishMatch();
            else requestAnimationFrame(gameLoop);
        }

        function renderDragonclaw() {
            let dist = Math.sqrt((hook.x - hook.owner.x)**2 + (hook.y - hook.owner.y)**2);
            let segments = Math.floor(dist / 22);
            let ang = Math.atan2(hook.y - hook.owner.y, hook.x - hook.owner.x);
            for(let i=0; i<=segments; i++) {
                let sx = hook.owner.x + Math.cos(ang) * (i * 22);
                let sy = hook.owner.y + Math.sin(ang) * (i * 22);
                ctx.save(); ctx.translate(sx, sy); ctx.rotate(ang);
                if(i === segments) {
                    ctx.fillStyle = "#f1f5f9"; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-35, -20); ctx.lineTo(-20, 0); ctx.lineTo(-35, 20); ctx.closePath(); ctx.fill();
                } else {
                    ctx.fillStyle = "#cbd5e1"; ctx.fillRect(-11, -6, 22, 12);
                }
                ctx.restore();
            }
        }

        function hit(target) {
            target.alive = false; target.respawn = Date.now() + 3000;
            if(target === enemy) { score.p++; showPopup("ПОПАЛ!", "#4ade80", true); }
            else { score.e++; showPopup("ПРОИГРАЛ!", "#f87171", false); }
            updateScoreUI();
        }

        function showPopup(txt, col, isE) {
            const div = document.createElement('div');
            div.className = 'status-popup'; div.innerText = txt; div.style.color = col;
            div.style.left = isE ? (enemy.x - 80) + 'px' : (player.x - 80) + 'px';
            div.style.top = '300px';
            document.getElementById('gameContainer').appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }

        async function finishMatch() {
            gameActive = false;
            user.matches++;
            if(score.p >= 7) { user.mmr += 40; user.coins += 200; alert("ПОБЕДА!"); }
            else { user.mmr -= 60; alert("ПОРАЖЕНИЕ..."); }
            if(user.mmr < 0) user.mmr = 0;
            await pudgeDb.from('pudge_profiles').upsert(user);
            enterMenu();
        }

        function exitGame() { gameActive = false; enterMenu(); }

        function addFriendPrompt() {
            const id = prompt("Введите ID игрока:");
            if(id) alert("Запрос отправлен игроку #" + id);
        }
    </script>
</body>
</html>
